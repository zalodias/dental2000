name: Release
run-name: ${{ github.ref_name }}

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" --repo="$GITHUB_REPOSITORY" --title="${GITHUB_REF_NAME#v}" --generate-notes
